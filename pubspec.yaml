name: controle_gastos
description: App de controle de gastos pessoais
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter

  # Gráficos
  fl_chart: ^0.70.2

  # Banco de dados local
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Gerenciamento de estado
  provider: ^6.1.2

  # Formatação de moeda e data
  intl: ^0.19.0

  # IDs únicos
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Gerador de código do Hive
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true